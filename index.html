<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>My Box Smart</title>
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/b/bf/My_Box_Smart.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #070707;
            color: #fff;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .logo {
            width: 110px;
            border-radius: 20px;
            margin-bottom: 24px;
            box-shadow: 0 0 30px rgba(229,9,20,0.5);
            animation: logoPulse 2s ease-in-out infinite;
        }
        @keyframes logoPulse {
            0%,100% { box-shadow: 0 0 20px rgba(229,9,20,0.4); }
            50%      { box-shadow: 0 0 50px rgba(229,9,20,0.8); }
        }
        .title {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 4px;
            color: #fff;
            margin-bottom: 6px;
        }
        .subtitle {
            font-size: 11px;
            color: #444;
            letter-spacing: 3px;
            margin-bottom: 40px;
        }
        .loader-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }
        .spinner {
            width: 48px; height: 48px;
            border: 3px solid #1a1a1a;
            border-top-color: #e50914;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #status-msg {
            font-size: 12px;
            color: #555;
            letter-spacing: 1px;
            text-align: center;
            max-width: 260px;
            line-height: 1.6;
            min-height: 40px;
        }
        .progress-bar-wrap {
            width: 220px;
            height: 3px;
            background: #1a1a1a;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 4px;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #e50914, #ff4444);
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        #version-badge {
            position: fixed;
            bottom: 16px;
            right: 16px;
            font-size: 9px;
            color: #222;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<img src="https://upload.wikimedia.org/wikipedia/commons/b/bf/My_Box_Smart.png" class="logo" alt="My Box Smart">
<div class="title">MY BOX SMART</div>
<div class="subtitle">CHARGEMENT EN COURS</div>

<div class="loader-wrap">
    <div class="spinner"></div>
    <div id="status-msg">Vérification des mises à jour...</div>
    <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress-bar"></div>
    </div>
</div>

<div id="version-badge">v<span id="v-display">—</span></div>

<script>
const SUPABASE_URL = "https://yvcdadenofftnbljutwk.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2Y2RhZGVub2ZmdG5ibGp1dHdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzQ0ODIsImV4cCI6MjA4ODQ1MDQ4Mn0.xqJzLpQszFmph599FBIvdE7NF88_i-JkABG-aSrAndE";

const STORE_KEY     = 'myboxtv_app_code';
const STORE_VERSION = 'myboxtv_app_version';

function setStatus(msg) {
    document.getElementById('status-msg').innerText = msg;
}
function setProgress(pct) {
    document.getElementById('progress-bar').style.width = Math.min(100, pct) + '%';
}

async function sbGet(table, params) {
    try {
        var q   = params ? '?' + params : '';
        var res = await fetch(SUPABASE_URL + '/rest/v1/' + table + q, {
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': 'Bearer ' + SUPABASE_KEY
            }
        });
        if (!res.ok) return null;
        return await res.json();
    } catch(e) { return null; }
}

function launchApp(code) {
    setStatus('Lancement...');
    setProgress(100);

    setTimeout(function() {
        var iframe = document.createElement('iframe');
        iframe.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;border:none;z-index:99999;';
        iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads allow-top-navigation');
        document.body.appendChild(iframe);

        iframe.srcdoc = code;

        iframe.onload = function() {
            ['.logo', '.title', '.subtitle', '.loader-wrap', '#version-badge'].forEach(function(sel) {
                var el = document.querySelector(sel);
                if (el) el.style.display = 'none';
            });
            document.body.style.background = '#000';
        };
    }, 150);
}

async function boot() {
    var localVersion = localStorage.getItem(STORE_VERSION) || '0';
    var localCode    = localStorage.getItem(STORE_KEY);

    setProgress(10);
    setStatus('Vérification des mises à jour...');

    var data = await sbGet('app_updates', 'select=version,code&order=version.desc&limit=1');

    setProgress(30);

    var remoteVersion = null;
    var remoteCode    = null;

    if (data && data.length > 0) {
        remoteVersion = String(data[0].version);
        document.getElementById('v-display').innerText = remoteVersion;
    }

    var needUpdate = remoteVersion && (remoteVersion !== localVersion);

    if (needUpdate) {
        setStatus('Nouvelle version ' + remoteVersion + ' disponible !\nTéléchargement...');
        setProgress(50);
        remoteCode = data[0].code;

        if (remoteCode && remoteCode.length > 100) {
            setProgress(80);
            setStatus('Installation de la mise à jour...');
            localStorage.setItem(STORE_KEY,     remoteCode);
            localStorage.setItem(STORE_VERSION, remoteVersion);
            setProgress(95);
            setStatus('Mise à jour installée ✓');
            setTimeout(function() { launchApp(remoteCode); }, 600);
        } else {
            if (localCode) {
                setStatus('Utilisation de la version locale...');
                launchApp(localCode);
            } else {
                setStatus('Erreur : aucune version disponible.\nVérifiez votre connexion.');
                setProgress(0);
            }
        }

    } else if (localCode) {
        document.getElementById('v-display').innerText = localVersion;
        setStatus('Version ' + localVersion + ' à jour ✓');
        setProgress(90);
        setTimeout(function() { launchApp(localCode); }, 400);

    } else {
        setStatus('Aucune version disponible.\nConnectez-vous à Internet\npour le premier chargement.');
        setProgress(0);
        setTimeout(boot, 5000);
    }
}

boot();
</script>
</body>
</html>
